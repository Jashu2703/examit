services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: examit
      POSTGRES_PASSWORD: examit_secret
      POSTGRES_DB: examit_db
    volumes:
      - examit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://examit:examit_secret@db:5432/examit_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  examit_pg_data: